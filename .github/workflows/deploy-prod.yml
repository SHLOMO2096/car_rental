name: Deploy Production

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Commit SHA / tag / branch to deploy (default: main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///./test_bootstrap.db
          SECRET_KEY: ci-secret-key
        run: pytest -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.git_ref }}"
          if [ -n "${REF_INPUT}" ]; then
            git fetch --tags --prune origin
            TARGET_SHA="$(git rev-parse "${REF_INPUT}")"
          else
            TARGET_SHA="${GITHUB_SHA}"
          fi
          echo "sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: ${TARGET_SHA}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Configure SSH known_hosts
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_PORT:-22}" -H "$PROD_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail
          PORT="${PROD_PORT:-22}"
          ssh -p "$PORT" "${PROD_USER}@${PROD_HOST}" \
            "TARGET_SHA='$TARGET_SHA' REPO_URL='$REPO_URL' REPO_DIR='/opt/car-rental' ENV_FILE='.env.production' COMPOSE_FILE='docker-compose.prod.yml' bash -s" \
            < scripts/deploy_production.sh

