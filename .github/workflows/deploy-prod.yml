name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Commit SHA / tag / branch to deploy (default: main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///./test_bootstrap.db
          SECRET_KEY: ci-secret-key
        run: pytest -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.git_ref }}"
          if [ -n "${REF_INPUT}" ]; then
            git fetch --tags --prune origin
            TARGET_SHA="$(git rev-parse "${REF_INPUT}")"
          else
            TARGET_SHA="${GITHUB_SHA}"
          fi
          echo "sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: ${TARGET_SHA}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy on VPS
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail
          PORT="${PROD_PORT:-22}"
          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "${PROD_USER}@${PROD_HOST}" \
            "TARGET_SHA='$TARGET_SHA' REPO_URL='$REPO_URL' bash -s" <<'ENDSSH'
          set -euo pipefail
          REPO_DIR="/opt/car-rental"

          # ── Bootstrap: clone if first deploy ──────────────────────────────
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "First deploy: cloning repository..."
            sudo mkdir -p "$REPO_DIR"
            sudo chown -R "$(whoami)":"$(whoami)" "$REPO_DIR"
            git clone "$REPO_URL" "$REPO_DIR"
          fi

          cd "$REPO_DIR"

          # ── Checkout exact commit ─────────────────────────────────────────
          git fetch --all --tags --prune
          git checkout --force "$TARGET_SHA"
          git reset --hard "$TARGET_SHA"

          # ── Verify env file exists ────────────────────────────────────────
          if [ ! -f ".env.production" ]; then
            echo "ERROR: .env.production not found in $REPO_DIR"
            echo "Run: cp .env.production.example .env.production && nano .env.production"
            exit 1
          fi

          # ── Deploy ────────────────────────────────────────────────────────
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans

          # ── Health check (wait up to 30s) ─────────────────────────────────
          echo "Waiting for health check..."
          for i in $(seq 1 10); do
            if curl -fsS http://localhost/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Health check failed after 30s"
              docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=50
              exit 1
            fi
            sleep 3
          done

          echo "Production deploy completed for $TARGET_SHA"
          ENDSSH

