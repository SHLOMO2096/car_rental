name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Commit SHA / tag / branch to deploy (default: main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///./test_bootstrap.db
          SECRET_KEY: ci-secret-key
        run: pytest -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.git_ref }}"
          if [ -n "${REF_INPUT}" ]; then
            git fetch --tags --prune origin
            TARGET_SHA="$(git rev-parse "${REF_INPUT}")"
          else
            TARGET_SHA="${GITHUB_SHA}"
          fi
          echo "sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: ${TARGET_SHA}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy on VPS
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          PORT="${PROD_PORT:-22}"
          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "${PROD_USER}@${PROD_HOST}" "TARGET_SHA='$TARGET_SHA' bash -s" <<'EOF'
          set -euo pipefail
          REPO_DIR="/opt/car-rental"
          cd "$REPO_DIR"
          git fetch --all --tags --prune
          git checkout --force "$TARGET_SHA"
          git reset --hard "$TARGET_SHA"
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          curl -fsS http://localhost/health > /dev/null
          echo "Production deploy completed for $TARGET_SHA"
          EOF

