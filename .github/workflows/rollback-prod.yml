name: Rollback Production

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Commit SHA / tag to rollback to"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  rollback:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve rollback SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --prune origin
          TARGET_SHA="$(git rev-parse "${{ github.event.inputs.git_ref }}")"
          echo "sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Rolling back to: ${TARGET_SHA}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Configure SSH known_hosts
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_PORT:-22}" -H "$PROD_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Rollback on VPS
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail
          PORT="${PROD_PORT:-22}"
          ssh -p "$PORT" "${PROD_USER}@${PROD_HOST}" \
            "TARGET_SHA='$TARGET_SHA' REPO_URL='$REPO_URL' REPO_DIR='/opt/car-rental' ENV_FILE='.env.production' COMPOSE_FILE='docker-compose.prod.yml' bash -s" \
            < scripts/deploy_production.sh

