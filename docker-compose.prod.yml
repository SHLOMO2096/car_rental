services:
  db:
    image: postgres:16-alpine
    networks:
      - car_rental_internal
      - car_rental_default
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - car_rental_internal
      - car_rental_default
      - traefik_public
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAILS_ENABLED: ${EMAILS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAILS_FROM: ${EMAILS_FROM:-noreply@carrental.co.il}
      EMAILS_FROM_NAME: ${EMAILS_FROM_NAME:-השכרת רכבים}
      SECURITY_ALERT_RECIPIENTS: ${SECURITY_ALERT_RECIPIENTS:-}
      GOOGLE_DRIVE_ENABLED: ${GOOGLE_DRIVE_ENABLED:-false}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${GOOGLE_DRIVE_CREDENTIALS_JSON:-}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.car-rental-api.rule=Host(`${PUBLIC_HOST:-waycar.co.il}`) && PathPrefix(`/api`)
      - traefik.http.routers.car-rental-api.entrypoints=websecure
      - traefik.http.routers.car-rental-api.priority=100
      - traefik.http.routers.car-rental-api.tls.certresolver=letsencrypt
      - traefik.http.routers.car-rental-api.middlewares=default-chain@file,api-rate-limit@file
      - traefik.http.services.car-rental-api.loadbalancer.server.port=8000
      - traefik.http.routers.car-rental-login.rule=Host(`${PUBLIC_HOST:-waycar.co.il}`) && Path(`/api/auth/login`)
      - traefik.http.routers.car-rental-login.entrypoints=websecure
      - traefik.http.routers.car-rental-login.priority=200
      - traefik.http.routers.car-rental-login.tls.certresolver=letsencrypt
      - traefik.http.routers.car-rental-login.middlewares=default-chain@file,login-rate-limit@file
      - traefik.http.routers.car-rental-login.service=car-rental-api
      - traefik.http.routers.car-rental-health.rule=Host(`${PUBLIC_HOST:-waycar.co.il}`) && Path(`/health`)
      - traefik.http.routers.car-rental-health.entrypoints=websecure
      - traefik.http.routers.car-rental-health.priority=150
      - traefik.http.routers.car-rental-health.tls.certresolver=letsencrypt
      - traefik.http.routers.car-rental-health.middlewares=default-chain@file
      - traefik.http.routers.car-rental-health.service=car-rental-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    networks:
      - car_rental_internal
      - traefik_public
    depends_on:
      - backend
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.car-rental-web.rule=Host(`${PUBLIC_HOST:-waycar.co.il}`)
      - traefik.http.routers.car-rental-web.entrypoints=websecure
      - traefik.http.routers.car-rental-web.priority=1
      - traefik.http.routers.car-rental-web.tls.certresolver=letsencrypt
      - traefik.http.routers.car-rental-web.middlewares=default-chain@file
      - traefik.http.services.car-rental-web.loadbalancer.server.port=80

volumes:
  pg_data:

networks:
  # Private network for this stack (prevents cross-project DNS alias collisions).
  car_rental_internal:
    driver: bridge

  # Shared external network so other projects/containers (e.g. y_car_accounting, evolution_api)
  # can reach this stack's services by DNS name (e.g. db:5432, backend:8000, y_car_accounting:5000).
  car_rental_default:
    external: true

  # Shared public reverse-proxy network owned by infra-proxy/Traefik.
  traefik_public:
    external: true
    name: traefik-public

