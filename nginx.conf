events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript;

  # Docker embedded DNS (so upstream hostnames can be resolved at request-time).
  # This prevents Nginx from failing to start if an optional external service
  # (like y_car_accounting) is temporarily stopped.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # ── Temporary HTTP-only edge until TLS certs are installed ─────────────────
  server {
    listen 80;
    server_name _;

    # ── Accounting agent API ─────────────────────────────────────────────────
    # Route /api/accounting/* to the external accounting service container.
    # NOTE: trailing slash in proxy_pass strips the /api/accounting/ prefix.
    location /api/accounting/ {
      limit_req zone=api burst=20 nodelay;

      # Use a variable so DNS is resolved at request-time.
      # If y_car_accounting is down, ONLY this route returns 503/502,
      # while the rest of the app remains available.
      set $accounting_upstream y_car_accounting:5000;
      proxy_connect_timeout 2s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass         http://$accounting_upstream/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      set $backend_upstream backend:8000;
      proxy_pass         http://$backend_upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Login — rate limit קפדני ─────────────────────────────────────────────
    location = /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      set $backend_upstream backend:8000;
      proxy_pass         http://$backend_upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
      set $backend_upstream backend:8000;
      proxy_pass http://$backend_upstream/health;
      access_log off;
    }

    # ── Frontend (React SPA — nginx static) ──────────────────────────────────
    # SPA routing (try_files) is handled inside the frontend container's nginx.
    location / {
      set $frontend_upstream frontend:80;
      proxy_pass         http://$frontend_upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
