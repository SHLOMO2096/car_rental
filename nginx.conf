events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name your-domain.co.il;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name your-domain.co.il;

    ssl_certificate     /etc/letsencrypt/live/your-domain.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend:8000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Login — rate limit קפדני ─────────────────────────────────────────────
    location = /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass         http://backend:8000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
      proxy_pass http://backend:8000;
      access_log off;
    }

    # ── Frontend (React SPA — nginx static) ──────────────────────────────────
    # SPA routing (try_files) is handled inside the frontend container's nginx.
    location / {
      proxy_pass         http://frontend:80;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
